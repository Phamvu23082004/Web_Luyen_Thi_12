<!-- Right Panel: Login Form -->

<form class="space-y-6">

<div class="md:hidden fixed bottom-0 left-0 -z-10 w-48 h-48 bg-tertiary/5 rounded-full blur-3xl"></div>
<script>
        // Micro-interaction for form labels and focus states
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.previousElementSibling.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                if (input.value === '') {
                    input.parentElement.previousElementSibling.classList.remove('text-primary');
                }
            });
        });

        // Toggle password visibility
        const toggleBtn = document.querySelector('button[type="button"] span.material-symbols-outlined');
        const passInput = document.getElementById('password');
        if(toggleBtn && passInput) {
            toggleBtn.parentElement.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                toggleBtn.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }
    </script>
